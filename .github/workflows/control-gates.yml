name: ContractorOS Control Gates

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - edited
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

jobs:
  contractoros-control-gates:
    name: contractoros-control-gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Python version
        run: python3 --version
      - name: Changed-file allowlist / lane check
        run: python3 scripts/control/check_changed_files.py
      - name: Forbidden-scope check
        run: python3 scripts/control/check_forbidden_scope.py
      - name: Required control-file update check
        run: python3 scripts/control/check_required_control_updates.py
      - name: PR body / linked issue / template completeness check
        run: python3 scripts/control/check_pr_contract.py
      - name: Owner-trigger / lane-eligibility marker check
        if: github.event_name == 'pull_request'
        run: python3 scripts/control/check_owner_trigger_review.py
      - name: Low-risk lane classification check
        if: github.event_name == 'pull_request'
        run: python3 scripts/control/check_low_risk_lane.py
      - name: Mandatory SHA-bound red-team marker check
        if: github.event_name == 'pull_request'
        run: python3 scripts/control/check_red_team_marker.py
      - name: Lockfile / dependency contamination check
        run: python3 scripts/control/check_forbidden_scope.py --lockfiles-only
      - name: Claim-language check
        run: python3 scripts/control/check_pr_contract.py --claims-only
